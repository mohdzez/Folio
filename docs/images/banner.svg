<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a853;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#d4a853;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Ambient glow top-left -->
  <ellipse cx="200" cy="150" rx="300" ry="200" fill="#d4a853" opacity="0.04" filter="url(#blur)"/>
  <!-- Ambient glow right -->
  <ellipse cx="1050" cy="280" rx="250" ry="180" fill="#d4a853" opacity="0.03" filter="url(#blur)"/>

  <!-- Fine grid lines (subtle) -->
  <g stroke="#ffffff" stroke-width="0.3" opacity="0.03">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
  </g>

  <!-- Left decorative rule -->
  <line x1="80" y1="120" x2="80" y2="280" stroke="#d4a853" stroke-width="1" opacity="0.4"/>
  <circle cx="80" cy="120" r="3" fill="#d4a853" opacity="0.6"/>
  <circle cx="80" cy="280" r="3" fill="#d4a853" opacity="0.6"/>

  <!-- Main logotype -->
  <text x="120" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-style="italic" font-weight="400" fill="#f0ebe3" opacity="0.95" letter-spacing="-2">folio</text>
  <!-- Amber dot accent -->
  <text x="384" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-style="italic" font-weight="400" fill="#d4a853">.</text>

  <!-- Tagline -->
  <text x="122" y="268" font-family="'Courier New', monospace" font-size="13" fill="#d4a853" letter-spacing="4" opacity="0.7">TASK MANAGEMENT · OFFLINE FIRST · PWA</text>

  <!-- Divider -->
  <line x1="120" y1="288" x2="480" y2="288" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>

  <!-- Sub-tagline -->
  <text x="122" y="310" font-family="Georgia, serif" font-size="15" font-style="italic" fill="#ffffff" opacity="0.35">Speed over everything.</text>

  <!-- Right side — floating UI elements -->
  <!-- Phone frame outline -->
  <rect x="680" y="40" width="180" height="320" rx="24" ry="24" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.08"/>
  <rect x="686" y="46" width="168" height="308" rx="20" ry="20" fill="#0f0f0f" opacity="0.6"/>

  <!-- Notch -->
  <rect x="740" y="44" width="60" height="8" rx="4" fill="#0a0a0a" opacity="0.9"/>

  <!-- App header -->
  <text x="706" y="90" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#f0ebe3" opacity="0.9">folio<tspan fill="#d4a853">.</tspan></text>
  <rect x="800" y="76" width="36" height="16" rx="8" fill="none" stroke="#d4a853" stroke-width="0.8" opacity="0.5"/>
  <text x="807" y="88" font-family="'Courier New', monospace" font-size="7" fill="#d4a853" opacity="0.7">guest</text>

  <!-- Filter tabs -->
  <rect x="700" y="100" width="148" height="1" fill="#ffffff" opacity="0.06"/>
  <text x="706" y="120" font-family="'Courier New', monospace" font-size="8" fill="#d4a853" letter-spacing="1">TODAY</text>
  <text x="748" y="120" font-family="'Courier New', monospace" font-size="8" fill="#ffffff" opacity="0.25" letter-spacing="1">PERSONAL</text>
  <text x="806" y="120" font-family="'Courier New', monospace" font-size="8" fill="#ffffff" opacity="0.25" letter-spacing="1">WORK</text>
  <line x1="706" y1="124" x2="730" y2="124" stroke="#d4a853" stroke-width="1.5"/>

  <!-- Filter bar -->
  <rect x="700" y="130" width="148" height="1" fill="#ffffff" opacity="0.06"/>
  <text x="706" y="145" font-family="'Courier New', monospace" font-size="7" fill="#d4a853" letter-spacing="1">ALL</text>
  <text x="728" y="145" font-family="'Courier New', monospace" font-size="7" fill="#ffffff" opacity="0.2" letter-spacing="1">TODAY</text>
  <text x="760" y="145" font-family="'Courier New', monospace" font-size="7" fill="#ffffff" opacity="0.2" letter-spacing="1">UPCOMING</text>
  <text x="814" y="145" font-family="'Courier New', monospace" font-size="7" fill="#ffffff" opacity="0.2" letter-spacing="1">OVERDUE</text>
  <rect x="700" y="148" width="148" height="0.5" fill="#ffffff" opacity="0.06"/>

  <!-- Task items -->
  <!-- Task 1 -->
  <rect x="700" y="156" width="148" height="36" rx="4" fill="#1a1a1a" opacity="0.8"/>
  <circle cx="716" cy="174" r="6" fill="none" stroke="#d4a853" stroke-width="1.2" opacity="0.7"/>
  <text x="730" y="171" font-family="Georgia, serif" font-size="10" fill="#f0ebe3" opacity="0.9">Call dentist</text>
  <text x="730" y="183" font-family="'Courier New', monospace" font-size="7" fill="#d4a853" opacity="0.6">Today 9:00</text>
  <text x="826" y="177" font-family="'Courier New', monospace" font-size="8" fill="#d4a853" opacity="0.4">★</text>

  <!-- Task 2 -->
  <rect x="700" y="196" width="148" height="36" rx="4" fill="#161616" opacity="0.8"/>
  <circle cx="716" cy="214" r="6" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.2"/>
  <text x="730" y="211" font-family="Georgia, serif" font-size="10" fill="#f0ebe3" opacity="0.7">Review pull request</text>
  <text x="730" y="223" font-family="'Courier New', monospace" font-size="7" fill="#888" opacity="0.6">Tomorrow</text>

  <!-- Task 3 -->
  <rect x="700" y="236" width="148" height="36" rx="4" fill="#161616" opacity="0.8"/>
  <circle cx="716" cy="254" r="6" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.2"/>
  <text x="730" y="251" font-family="Georgia, serif" font-size="10" fill="#f0ebe3" opacity="0.7">Pick up groceries</text>
  <text x="730" y="263" font-family="'Courier New', monospace" font-size="7" fill="#888" opacity="0.6">This weekend</text>

  <!-- Task 4 (completed, strikethrough) -->
  <rect x="700" y="276" width="148" height="30" rx="4" fill="#111111" opacity="0.5"/>
  <circle cx="716" cy="291" r="6" fill="#2a2a2a" opacity="0.8"/>
  <line x1="712" y1="291" x2="720" y2="291" stroke="#d4a853" stroke-width="1" opacity="0.4"/>
  <text x="730" y="288" font-family="Georgia, serif" font-size="10" fill="#ffffff" opacity="0.2" text-decoration="line-through">Buy new keyboard</text>
  <text x="730" y="299" font-family="'Courier New', monospace" font-size="7" fill="#ffffff" opacity="0.1">done</text>

  <!-- Add button -->
  <circle cx="770" cy="330" r="18" fill="#d4a853"/>
  <text x="762" y="336" font-family="Georgia, serif" font-size="20" fill="#0a0a0a" font-weight="bold">+</text>

  <!-- Second phone (slightly behind, offset) — light mode -->
  <rect x="920" y="60" width="160" height="290" rx="22" ry="22" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
  <rect x="926" y="66" width="148" height="278" rx="18" ry="18" fill="#f5f0e8" opacity="0.08"/>

  <!-- Stack lines for depth on second phone -->
  <rect x="932" y="100" width="130" height="1" fill="#ffffff" opacity="0.05"/>
  <rect x="932" y="130" width="100" height="8" rx="2" fill="#ffffff" opacity="0.04"/>
  <rect x="932" y="148" width="80" height="8" rx="2" fill="#ffffff" opacity="0.03"/>
  <rect x="932" y="166" width="110" height="8" rx="2" fill="#ffffff" opacity="0.03"/>
  <rect x="932" y="184" width="90" height="8" rx="2" fill="#ffffff" opacity="0.02"/>

  <!-- Tech stack badges bottom right -->
  <g opacity="0.5">
    <rect x="870" y="350" width="56" height="18" rx="3" fill="none" stroke="#d4a853" stroke-width="0.5" opacity="0.4"/>
    <text x="877" y="363" font-family="'Courier New', monospace" font-size="7" fill="#d4a853" letter-spacing="1">REACT</text>

    <rect x="932" y="350" width="72" height="18" rx="3" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
    <text x="939" y="363" font-family="'Courier New', monospace" font-size="7" fill="#ffffff" opacity="0.4" letter-spacing="1">FIREBASE</text>

    <rect x="1010" y="350" width="60" height="18" rx="3" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
    <text x="1017" y="363" font-family="'Courier New', monospace" font-size="7" fill="#ffffff" opacity="0.4" letter-spacing="1">OFFLINE</text>

    <rect x="1076" y="350" width="48" height="18" rx="3" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
    <text x="1082" y="363" font-family="'Courier New', monospace" font-size="7" fill="#ffffff" opacity="0.4" letter-spacing="1">FREE</text>
  </g>

  <!-- Version tag -->
  <text x="1100" y="32" font-family="'Courier New', monospace" font-size="9" fill="#ffffff" opacity="0.15" letter-spacing="2">v1.0</text>
</svg>
