<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1714">
  <meta name="description" content="Folio — Personal task manager">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Folio">
  <title>Folio</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

<div id="app">
  <header id="page-header">
    <div class="header-left">
      <div class="page-date" id="header-date"></div>
      <div class="page-title" id="header-title">Today</div>
    </div>
    <div class="header-right">
      <button class="hdr-btn" id="search-nav-btn">⌕</button>
      <button class="hdr-btn" id="filter-btn">⊟</button>
      <button class="hdr-btn" id="settings-btn">⚙</button>
    </div>
  </header>

  <div id="content">

    <div class="page-view active" id="page-today">
      <div class="progress-wrap">
        <svg class="ring-svg" width="52" height="52" viewBox="0 0 52 52">
          <circle class="ring-bg"   cx="26" cy="26" r="22"/>
          <circle class="ring-fill" id="ring" cx="26" cy="26" r="22"
            stroke-dasharray="138.2" stroke-dashoffset="138.2"/>
          <text class="ring-pct" id="ring-pct" x="26" y="26">0%</text>
        </svg>
        <div class="progress-text">
          <h3 id="progress-title">Let's go</h3>
          <p  id="progress-sub">No tasks today</p>
        </div>
        <button class="pill-btn" id="focus-launch-btn">⊙ Focus</button>
      </div>
      <div id="today-tasks"></div>
    </div>

    <div class="page-view" id="page-upcoming">
      <div class="stats-row" id="upcoming-stats"></div>
      <div id="upcoming-tasks"></div>
    </div>

    <div class="page-view" id="page-all">
      <div class="stats-row" id="all-stats"></div>
      <div id="all-tasks"></div>
    </div>

    <div class="page-view" id="page-categories">
      <div class="cat-grid" id="cat-grid"></div>
      <button class="add-cat-btn" id="add-cat-btn">＋  New Category</button>
    </div>

    <div class="page-view" id="page-cat-detail">
      <div id="cat-detail-tasks"></div>
    </div>

    <div class="page-view" id="page-archive">
      <div class="archive-info">Completed tasks · <button class="link-btn" id="clear-archive-btn">Clear all</button></div>
      <div id="archive-tasks"></div>
    </div>

    <div class="page-view" id="page-search">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="search-input" type="search" placeholder="Search tasks, notes, tags…" autocomplete="off" autocapitalize="none">
        <button class="search-clear" id="search-clear" style="display:none">✕</button>
      </div>
      <div id="search-results"></div>
    </div>

  </div>

  <nav id="bottom-nav">
    <div class="nav-inner">
      <div class="nav-tab active" data-page="today">
        <span class="tab-icon">◈</span>
        <span class="tab-label">Today</span>
        <span class="tab-badge" id="count-today"></span>
      </div>
      <div class="nav-tab" data-page="upcoming">
        <span class="tab-icon">◷</span>
        <span class="tab-label">Soon</span>
        <span class="tab-badge" id="count-upcoming"></span>
      </div>
      <div class="nav-tab fab-tab" id="fab-btn">
        <div class="fab-inner">＋</div>
      </div>
      <div class="nav-tab" data-page="all">
        <span class="tab-icon">▤</span>
        <span class="tab-label">All</span>
      </div>
      <div class="nav-tab" data-page="archive">
        <span class="tab-icon">◫</span>
        <span class="tab-label">Archive</span>
      </div>
    </div>
  </nav>
</div>

<!-- FOCUS MODE -->
<div id="focus-overlay">
  <div class="focus-header">
    <button class="focus-hdr-btn" id="focus-close-btn">✕</button>
    <span class="focus-label">Focus</span>
    <button class="focus-hdr-btn" id="focus-sched-btn">🔔</button>
  </div>
  <div class="focus-body" id="focus-body">
    <div id="focus-cat-badge"></div>
    <h1 id="focus-title"></h1>
    <div id="focus-meta-row"></div>
    <div id="focus-subtasks"></div>
    <div id="focus-notes-preview"></div>
  </div>
  <div class="focus-footer">
    <button class="focus-edit-btn" id="focus-edit-btn">✎ Edit</button>
    <button class="focus-done-btn" id="focus-done-btn">✓ Complete</button>
  </div>
</div>

<!-- TASK SHEET -->
<div class="sheet-overlay" id="task-sheet-overlay">
  <div class="bottom-sheet" id="task-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-scroll">
      <div class="sheet-title" id="task-sheet-title">New Task</div>
      <div class="form-group">
        <input class="sheet-input" id="t-title" type="text" placeholder="What needs to be done?" autocomplete="off" autocapitalize="sentences">
      </div>
      <div class="sheet-row">
        <div class="form-group flex1">
          <label class="form-label">Due date</label>
          <input class="sheet-input" id="t-due" type="date">
        </div>
        <div class="form-group flex1">
          <label class="form-label">Priority</label>
          <div class="seg-ctrl" id="t-priority-seg">
            <button class="seg-btn active" data-val="none">—</button>
            <button class="seg-btn" data-val="low" style="color:var(--text-muted)">Low</button>
            <button class="seg-btn" data-val="med" style="color:var(--gold)">Med</button>
            <button class="seg-btn" data-val="high" style="color:var(--red)">High</button>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <div class="cat-pill-row" id="t-cat-pills"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Tags</label>
        <div class="tag-input-wrap">
          <div class="tag-pills" id="t-tag-pills"></div>
          <input class="tag-input" id="t-tag-input" type="text" placeholder="Type and press Enter…" autocapitalize="none">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Repeat</label>
        <div class="seg-ctrl" id="t-recur-seg">
          <button class="seg-btn active" data-val="none">Never</button>
          <button class="seg-btn" data-val="daily">Daily</button>
          <button class="seg-btn" data-val="weekly">Weekly</button>
          <button class="seg-btn" data-val="monthly">Monthly</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Subtasks</label>
        <div id="subtask-list" class="subtask-list"></div>
        <div class="subtask-add-row">
          <input class="sheet-input" id="subtask-input" type="text" placeholder="Add a subtask…" autocapitalize="sentences">
          <button class="icon-btn" id="subtask-add-btn">＋</button>
        </div>
      </div>
      <div class="sheet-footer">
        <button class="btn btn-ghost" id="task-cancel-btn">Cancel</button>
        <button class="btn btn-primary" id="task-save-btn">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- CATEGORY SHEET -->
<div class="sheet-overlay" id="cat-sheet-overlay">
  <div class="bottom-sheet bottom-sheet-sm" id="cat-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-scroll">
      <div class="sheet-title">New Category</div>
      <div class="form-group">
        <input class="sheet-input" id="c-name" type="text" placeholder="Category name…" autocapitalize="words">
      </div>
      <div class="form-group">
        <label class="form-label">Color</label>
        <div class="color-opts" id="color-opts"></div>
      </div>
      <div class="sheet-footer">
        <button class="btn btn-ghost" id="cat-cancel-btn">Cancel</button>
        <button class="btn btn-primary" id="cat-save-btn">Create</button>
      </div>
    </div>
  </div>
</div>

<!-- FILTER SHEET -->
<div class="sheet-overlay" id="filter-sheet-overlay">
  <div class="bottom-sheet" id="filter-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-scroll">
      <div class="sheet-title-row">
        <span class="sheet-title">Filter &amp; Sort</span>
        <button class="link-btn" id="filter-reset-btn">Reset</button>
      </div>
      <label class="form-label">Sort by</label>
      <div class="seg-ctrl full-seg" id="sort-seg">
        <button class="seg-btn active" data-val="due">Due</button>
        <button class="seg-btn" data-val="priority">Priority</button>
        <button class="seg-btn" data-val="created">Created</button>
        <button class="seg-btn" data-val="alpha">A–Z</button>
      </div>
      <label class="form-label mt-16">Priority</label>
      <div class="filter-checks" id="filter-pri-checks">
        <label class="check-pill"><input type="checkbox" value="high"> ⬤ High</label>
        <label class="check-pill"><input type="checkbox" value="med"> ⬤ Med</label>
        <label class="check-pill"><input type="checkbox" value="low"> ⬤ Low</label>
      </div>
      <label class="form-label mt-16">Categories</label>
      <div class="filter-checks" id="filter-cat-checks"></div>
      <label class="form-label mt-16">Tags</label>
      <div class="filter-checks" id="filter-tag-checks"></div>
      <div class="toggle-rows">
        <div class="toggle-row">
          <span>Compact view</span>
          <label class="toggle-switch"><input type="checkbox" id="density-toggle"><span class="toggle-knob"></span></label>
        </div>
      </div>
      <div class="sheet-footer">
        <button class="btn btn-ghost" id="filter-cancel-btn">Cancel</button>
        <button class="btn btn-primary" id="filter-apply-btn">Apply</button>
      </div>
    </div>
  </div>
</div>

<!-- SCHEDULER SHEET -->
<div class="sheet-overlay" id="sched-sheet-overlay">
  <div class="bottom-sheet" id="sched-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-scroll">
      <div class="sheet-title">🔔 Reminder</div>
      <div id="sched-task-name" class="sched-task-name"></div>
      <div id="sched-presets" class="sched-presets">
        <button class="sched-preset-btn" data-preset="1h">1 hour</button>
        <button class="sched-preset-btn" data-preset="3h">3 hours</button>
        <button class="sched-preset-btn" data-preset="tonight">Tonight 9pm</button>
        <button class="sched-preset-btn" data-preset="tomorrow-morning">Tomorrow 9am</button>
        <button class="sched-preset-btn" data-preset="tomorrow-evening">Tomorrow 6pm</button>
        <button class="sched-preset-btn" data-preset="next-week">Next week</button>
      </div>
      <div class="sched-divider"><span>or custom</span></div>
      <div class="sheet-row">
        <div class="form-group flex1"><label class="form-label">Date</label><input class="sheet-input" id="sched-date" type="date"></div>
        <div class="form-group flex1"><label class="form-label">Time</label><input class="sheet-input" id="sched-time" type="time"></div>
      </div>
      <div class="form-group"><input class="sheet-input" id="sched-message" type="text" placeholder="Custom message (optional)"></div>
      <div class="sched-existing">
        <div class="sched-existing-label">Scheduled reminders</div>
        <div id="sched-list"></div>
      </div>
      <div class="sheet-footer">
        <button class="btn btn-ghost" id="sched-cancel-btn">Cancel</button>
        <button class="btn btn-primary" id="sched-save-btn">🔔 Set</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS SHEET -->
<div class="sheet-overlay" id="settings-sheet-overlay">
  <div class="bottom-sheet bottom-sheet-sm" id="settings-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-scroll">
      <div class="sheet-title">Settings</div>
      <div class="settings-group">
        <div class="settings-label">Notifications</div>
        <button class="settings-row" id="notif-btn">
          <span>🔔</span><span id="notif-label">Enable Notifications</span><span class="arr">›</span>
        </button>
        <div class="settings-row">
          <span>☀️</span><span>Daily digest 8am</span>
          <label class="toggle-switch" style="margin-left:auto">
            <input type="checkbox" id="daily-digest-toggle">
            <span class="toggle-knob"></span>
          </label>
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-label">Data</div>
        <button class="settings-row" id="export-btn"><span>⬆</span><span>Export JSON</span><span class="arr">›</span></button>
        <button class="settings-row" id="import-btn"><span>⬇</span><span>Import JSON</span><span class="arr">›</span></button>
        <input type="file" id="import-file" accept=".json" style="display:none">
      </div>
    </div>
  </div>
</div>

<!-- NOTES PANEL -->
<div id="notes-overlay">
  <aside id="notes-panel">
    <div class="notes-header">
      <div class="notes-header-top">
        <button id="notes-close-btn" class="notes-back-btn">← Back</button>
        <button class="notes-preview-toggle" id="notes-preview-btn">👁 Preview</button>
      </div>
      <h2 id="notes-task-title" class="notes-task-title"></h2>
      <div id="notes-meta" class="notes-meta"></div>
    </div>
    <div id="notes-toolbar" class="notes-toolbar">
      <button class="notes-tool-btn" data-fmt="heading">H</button>
      <button class="notes-tool-btn bold-btn" data-fmt="bold">B</button>
      <button class="notes-tool-btn italic-btn" data-fmt="italic">I</button>
      <button class="notes-tool-btn" data-fmt="code">`</button>
      <span class="notes-tool-sep"></span>
      <button class="notes-tool-btn" data-fmt="bullet">•</button>
      <button class="notes-tool-btn" data-fmt="checkbox">☐</button>
      <span class="notes-tool-sep"></span>
      <button class="notes-tool-btn" data-fmt="hr">—</button>
    </div>
    <div class="notes-editor-wrap">
      <textarea id="notes-textarea" class="notes-textarea" spellcheck="true"
        placeholder="Notes for this task…&#10;&#10;## Heading  **bold**  _italic_&#10;- bullet  - [ ] checkbox"></textarea>
      <div id="notes-preview" class="notes-preview" style="display:none"></div>
    </div>
    <div class="notes-footer">
      <span id="notes-count" class="notes-count">0 words</span>
      <span id="notes-save-status" class="notes-save-status saved">✓ Saved</span>
    </div>
  </aside>
</div>

<!-- BULK ACTION BAR -->
<div id="bulk-bar" class="bulk-bar" style="display:none">
  <span id="bulk-count">0 selected</span>
  <div class="bulk-actions">
    <button class="bulk-btn" id="bulk-done-btn">✓ Done</button>
    <button class="bulk-btn" id="bulk-archive-btn">◫</button>
    <button class="bulk-btn danger" id="bulk-delete-btn">✕</button>
    <button class="bulk-btn" id="bulk-cancel-btn">Cancel</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast">
  <span id="toast-msg"></span>
  <button id="toast-undo" class="toast-undo" style="display:none">Undo</button>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
