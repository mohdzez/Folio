name = "folio-notifier"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# KV namespace for storing scheduled notifications
[[kv_namespaces]]
binding = "FOLIO_KV"
id = "1531a78cc2fe450a92dfc7ebc9958ab9"

# Cron: runs every minute — 1,440 invocations/day.
# KV usage is safe: only 1 list read/tick (1,440 reads/day = 1.4% of 100k free limit).
# OAuth token is cached in KV so only 24 writes/day regardless of cron frequency.
[triggers]
crons = ["*/1 * * * *"]
