name = "folio-notifier"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# KV namespace for storing scheduled notifications
[[kv_namespaces]]
binding = "FOLIO_KV"
id = "1531a78cc2fe450a92dfc7ebc9958ab9"

# Cron: runs every minute to fire due notifications
[triggers]
crons = ["*/1 * * * *"]

# Secrets (set once via `wrangler secret put`):
#   FCM_SERVER_KEY  — Firebase Cloud Messaging server key
#                     Firebase Console → Project Settings → Cloud Messaging →
#                     Cloud Messaging API (Legacy) → Server key
#   API_KEY         — random secret shared with the PWA; generate with:
#                     openssl rand -hex 32
