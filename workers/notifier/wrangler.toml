name = "folio-notifier"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# KV namespace for storing scheduled notifications
[[kv_namespaces]]
binding = "FOLIO_KV"
id = "1531a78cc2fe450a92dfc7ebc9958ab9"

# Cron: runs every 2 minutes — 720 invocations/day.
# KV list operations free tier limit is 1,000/day. At 1 per tick, running every minute
# produces 1,440 list ops/day which exceeds the limit. Every 2 minutes = 720 list ops/day.
# OAuth token is cached in KV so only ~24 writes/day regardless of cron frequency.
[triggers]
crons = ["*/2 * * * *"]
