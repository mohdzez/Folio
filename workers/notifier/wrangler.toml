name = "folio-notifier"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# KV namespace for storing scheduled notifications
[[kv_namespaces]]
binding = "FOLIO_KV"
id = "1531a78cc2fe450a92dfc7ebc9958ab9"

# Cron: runs every 5 minutes — 288/day vs 1440/day at every-minute
# Task reminders only need ~5min precision; this saves 80% of Worker invocations
[triggers]
crons = ["*/5 * * * *"]
